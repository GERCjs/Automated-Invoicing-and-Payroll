{% extends "base.html" %}

{% block title %}Password Updated | Vaniday Operations Portal{% endblock %}

{% block content %}
<section class="auth-page auth-wrapper">
    <div class="auth-card">
        <div class="auth-card-head auth-card-header">Password Updated</div>
        <div class="auth-card-body">
            <h1 class="auth-portal-title">Password Updated</h1>
            <p class="auth-portal-subtitle">You can now log in with your new password.</p>
            <div class="auth-links mt-3">
                <a href="{% url 'login' %}">Back to Login</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
