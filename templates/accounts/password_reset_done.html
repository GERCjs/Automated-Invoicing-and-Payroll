{% extends "base.html" %}

{% block title %}Reset Link Sent | Vaniday Operations Portal{% endblock %}

{% block content %}
<section class="auth-page auth-wrapper">
    <div class="auth-card">
        <div class="auth-card-head auth-card-header">Reset Link Sent</div>
        <div class="auth-card-body">
            <h1 class="auth-portal-title">Check Your Email</h1>
            <p class="auth-portal-subtitle">If the email matches an active account, a password reset link has been sent.</p>
            <div class="auth-links mt-3">
                <a href="{% url 'login' %}">Back to Login</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
