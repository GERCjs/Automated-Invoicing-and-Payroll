{% extends "base.html" %}

{% block title %}Payment Cancelled{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="h4">Payment cancelled</h1>
        <p class="mb-3">No payment was captured in this checkout flow.</p>
        {% if next_url %}
        <a href="{{ next_url }}" class="btn btn-outline-primary">Return to Invoice</a>
        {% endif %}
    </div>
</div>
{% endblock %}
